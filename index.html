<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스터디 메이트 - 실시간 동기화 현황판</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">

                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">Study Mate Sync</h1>
                    <p class="text-xs text-slate-500 font-medium">우리들의 실시간 상벌점 및 정산소</p>
                </div>
            </div>

            <div class="flex gap-3 text-xs font-bold">
                <div class="bg-amber-50 border border-amber-200 text-amber-800 px-3 py-2 rounded-xl flex items-center gap-1.5 shadow-xs">

            <div class="flex gap-2">

                    <i class="fa-solid fa-gear mr-1"></i> 보너스 기준
                </button>
                <button onclick="addNewFriend()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-4 py-2 rounded-xl transition shadow-sm cursor-pointer">
                    <i class="fa-solid fa-user-plus mr-1"></i> 친구 등록하기

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-2 bg-white px-2 py-1 rounded-xl border border-slate-200 shadow-xs">

                    <i class="fa-solid fa-chevron-left"></i>

                <h2 id="week-title" class="text-sm md:text-base font-bold text-slate-800 px-2 min-w-[180px] text-center">주차 계산 중...</h2>
                <button onclick="changeWeek(1)" class="p-2 hover:bg-slate-50 rounded-lg text-slate-500 hover:text-slate-800 transition cursor-pointer">

            <span id="sync-status" class="text-xs bg-emerald-100 text-emerald-800 font-bold px-3 py-1.5 rounded-full flex items-center gap-1.5 shadow-xs">

        <div class="mb-6 bg-indigo-50 border border-indigo-100 text-indigo-700 text-xs font-semibold rounded-xl px-4 py-3 flex flex-wrap gap-x-4 gap-y-1">

            <span>📉 목표시간 미준수: -1점</span>

            <span>💰 매주 마감 시 잔여 점수가 마이너스면 500원 × |점수| 정산, 플러스면 다음 주로 그대로 이월</span>
        </div>

        <div id="friends-container" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>

    <!-- 시간 선택 모달 (스크롤 피커) -->

                <span class="text-2xl font-bold text-slate-400">:</span>
                <select id="tp-minute" class="text-2xl font-bold text-center bg-slate-50 border border-slate-200 rounded-xl py-3 px-2 w-24 focus:outline-none focus:ring-2 focus:ring-indigo-300"></select>

            <div class="flex gap-2">

    <!-- Day Off 선택 모달 (스크롤 피커) -->

        <div class="bg-white rounded-2xl shadow-xl w-full max-w-xs p-5">
            <h3 class="text-sm font-bold text-slate-800 mb-4 text-center">Day Off 요일 선택</h3>
            <div class="flex justify-center mb-5">
                <select id="do-select" class="text-lg font-bold text-center bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 w-full focus:outline-none focus:ring-2 focus:ring-amber-300"></select>
            </div>
            <div class="flex gap-2">

    <!-- 보너스 기준 설정 모달 -->
    <div id="settings-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] hidden items-center justify-center px-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-xs p-5">
            <h3 class="text-sm font-bold text-slate-800 mb-2 text-center">보너스(+1점) 기준 시간</h3>
            <p class="text-[11px] text-slate-500 text-center mb-4">이 시간 이상 공부하면 +1점을 받아요. 모두에게 공통으로 적용돼요.</p>
            <div class="flex justify-center items-center gap-2 mb-5">
                <select id="settings-bonus-hours" class="text-2xl font-bold text-center bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 w-32 focus:outline-none focus:ring-2 focus:ring-indigo-300"></select>
                <span class="text-sm font-bold text-slate-500">시간</span>
            </div>
            <div class="flex gap-2">
                <button onclick="closeSettingsModal(false)" class="flex-1 py-2.5 rounded-xl bg-slate-100 text-slate-600 font-bold text-sm cursor-pointer">취소</button>
                <button onclick="closeSettingsModal(true)" class="flex-1 py-2.5 rounded-xl bg-indigo-600 text-white font-bold text-sm cursor-pointer">저장</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://jgmrktikgxtivsedsvmz.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnbXJrdGlrZ3h0aXZzZWRzdm16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NzM3MzQsImV4cCI6MjA5OTM0OTczNH0.cL2BOJGYFvKtFjNloDwJOd6OwgXoJ8d8PeI1MRadEXo";

        let supabaseClient = null;

        function initSupabase() {
            try {
                if (window.supabase && typeof window.supabase.createClient === 'function') {
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                }
            } catch(e) {
                console.error("Supabase 로드 실패:", e);
            }
        }

        const SETTINGS_NAME = '__settings__';
        const SETTINGS_WEEK_KEY = 'global_settings';
        const FINE_PER_POINT = 500;
        let appSettings = { bonusHours: 8 };

        let weekOffset = 0;
        let currentWeekDates = [];
        let serverData = [];
        let selectedDaysMap = {};
        let syncedWeeks = new Set(); // 이미 마스터 동기화를 완료한 주차 (중복 라운드트립 방지)
        let ledgerMap = {}; // { friendName: { weekKey: {start, raw, end, fine, isComplete} } }

        function updateDDays() {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()); // 시:분:초 영향 제거
            const mopyungDate = new Date(2026, 8, 3);  // 9월 3일 (month는 0-indexed)
            const suneungDate = new Date(2026, 10, 19); // 11월 19일
            const ddayMopyung = Math.round((mopyungDate - today) / (1000 * 60 * 60 * 24));
            const ddaySuneung = Math.round((suneungDate - today) / (1000 * 60 * 60 * 24));
            document.getElementById('mopyung-dday').innerText = ddayMopyung > 0 ? `D-${ddayMopyung}` : ddayMopyung === 0 ? `D-Day` : `D+${Math.abs(ddayMopyung)}`;
            document.getElementById('suneung-dday').innerText = ddaySuneung > 0 ? `D-${ddaySuneung}` : ddaySuneung === 0 ? `D-Day` : `D+${Math.abs(ddaySuneung)}`;
        }

        function stripTime(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
        function addDays(d, n){ const r = new Date(d); r.setDate(r.getDate()+n); return r; }
        function isoDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        function todayISO(){ return isoDate(stripTime(new Date())); }

        function getWeekDates(offset) {
            const current = new Date();
            current.setDate(current.getDate() + (offset * 7));
            const distanceToMonday = (current.getDay() === 0 ? 7 : current.getDay()) - 1;
            const monday = new Date(current.setDate(current.getDate() - distanceToMonday));
            const days = ["월", "화", "수", "목", "금", "토", "일"];
            return days.map((day, idx) => {
                const nextDay = new Date(monday);
                nextDay.setDate(monday.getDate() + idx);
                return {
                    label: `${nextDay.getMonth() + 1}/${nextDay.getDate()}(${day})`,
                    storageKey: `${nextDay.getFullYear()}-${nextDay.getMonth() + 1}-${nextDay.getDate()}`
                };
            });
        }

        function getWeekStorageKey() {
            return `week_${currentWeekDates[0].storageKey}`;
        }

        // "2026-7-13" 형태의 날짜 키를 Date로 변환
        function parseDateKey(dateKey) {
            const [y, m, d] = dateKey.split('-').map(Number);
            return new Date(y, m - 1, d);
        }
        // "week_2026-7-13" 형태의 week_key를 Date로 변환 (master_list/설정용 키는 null)
        function parseWeekKeyDate(weekKey) {
            if (!weekKey || !weekKey.startsWith('week_')) return null;
            return parseDateKey(weekKey.replace('week_', ''));
        }

        function changeWeek(direction) {
            weekOffset += direction;
            currentWeekDates = getWeekDates(weekOffset);
            loadServerData();
        }

        function parseDayTargets(friend) {
            const fallback = friend.target_start_time || "08:40";
            if (!friend.notes || friend.notes.trim() === "") {
                return Array(7).fill(fallback);
            }
            try {
                const blocks = friend.notes.split("|");
                if (blocks.length === 7) {
                    return blocks.map(t => (t && t.trim() !== "" && t !== "null") ? t : fallback);
                }
            } catch(e) {}
            return Array(7).fill(fallback);
        }

        // ===== 보너스 기준 설정 (Supabase에 sentinel row로 저장, 스키마 변경 불필요) =====
        async function loadSettings() {
            if (!supabaseClient) return;
            try {
                const { data, error } = await supabaseClient
                    .from('study_mate')
                    .select('*')
                    .eq('name', SETTINGS_NAME)
                    .eq('week_key', SETTINGS_WEEK_KEY)
                    .maybeSingle();
                if (error) { console.warn("설정 로드 실패:", error.message); return; }
                if (data && data.notes) {
                    try {
                        const parsed = JSON.parse(data.notes);
                        if (parsed && typeof parsed.bonusHours === 'number') {
                            appSettings.bonusHours = parsed.bonusHours;
                        }
                    } catch(e) {}
                }
            } catch(e) { console.warn(e); }
            const el = document.getElementById('bonus-rule-text');
            if (el) el.innerText = `📈 ${appSettings.bonusHours}시간 이상 공부: +1점 (상쇄 가능)`;
        }

        async function saveSettings(bonusHours) {
            appSettings.bonusHours = bonusHours;
            if (!supabaseClient) return;
            const { error } = await supabaseClient.from('study_mate').upsert([{
                id: 1,
                name: SETTINGS_NAME,
                week_key: SETTINGS_WEEK_KEY,
                notes: JSON.stringify({ bonusHours })
            }], { onConflict: 'name,week_key' });
            if (error) { alert("설정 저장 실패: " + error.message); }
        }

        let _settingsResolve = null;
        function openSettingsModal() {
            const sel = document.getElementById('settings-bonus-hours');
            sel.innerHTML = Array.from({length: 16}, (_, i) => i + 1).map(h =>
                `<option value="${h}" ${h === appSettings.bonusHours ? 'selected' : ''}>${h}</option>`
            ).join('');
            const modal = document.getElementById('settings-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }
        async function closeSettingsModal(confirmed) {
            const modal = document.getElementById('settings-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            if (confirmed) {
                const val = parseInt(document.getElementById('settings-bonus-hours').value, 10);
                await saveSettings(val);
                const el = document.getElementById('bonus-rule-text');
                if (el) el.innerText = `📈 ${appSettings.bonusHours}시간 이상 공부: +1점 (상쇄 가능)`;
                loadServerData();
            }
        }

        // ===== 상/벌점 계산 =====
        function computeRawPoints(row) {
            const today = todayISO();
            const weekMonday = parseWeekKeyDate(row.week_key);
            if (!weekMonday) return 0;
            const timeList = row.time_done_list || [false,false,false,false,false,false,false];
            const startList = row.start_done_list || [false,false,false,false,false,false,false];
            const bonusList = row.bonus_done_list || [false,false,false,false,false,false,false];
            let sum = 0;
            for (let i = 0; i < 7; i++) {
                const dISO = isoDate(addDays(weekMonday, i));
                if (dISO > today) continue; // 아직 안 지난 날은 집계 제외
                if (row.day_off_used && row.day_off_day === i) continue; // day off는 집계 제외
                if (!timeList[i]) sum -= 1;
                if (!startList[i]) sum -= 1;
                if (bonusList[i]) sum += 1;
            }
            return sum;
        }

        async function loadHistoryAndComputeLedgers() {
            ledgerMap = {};
            if (!supabaseClient) return;
            try {
                const { data: allRows, error } = await supabaseClient
                    .from('study_mate')
                    .select('*')
                    .neq('week_key', 'master_list')
                    .neq('week_key', SETTINGS_WEEK_KEY);
                if (error) { console.warn("이력 로드 실패:", error.message); return; }

                const grouped = {};
                (allRows || []).forEach(r => {
                    if (r.name === SETTINGS_NAME) return;
                    if (!grouped[r.name]) grouped[r.name] = [];
                    grouped[r.name].push(r);
                });

                Object.keys(grouped).forEach(name => {
                    const rows = grouped[name]
                        .filter(r => parseWeekKeyDate(r.week_key))
                        .sort((a, b) => parseWeekKeyDate(a.week_key) - parseWeekKeyDate(b.week_key));
                    let balance = 0;
                    const ledger = {};
                    rows.forEach(row => {
                        const raw = computeRawPoints(row);
                        const start = balance;
                        const end = start + raw;
                        const weekMonday = parseWeekKeyDate(row.week_key);
                        const isComplete = addDays(weekMonday, 6) < stripTime(new Date());
                        const fine = end < 0 ? Math.abs(end) * FINE_PER_POINT : 0;
                        ledger[row.week_key] = { start, raw, end, fine, isComplete };
                        balance = end >= 0 ? end : 0;
                    });
                    ledgerMap[name] = ledger;
                });
            } catch(e) { console.warn(e); }
        }

        function getLedgerFor(friend) {
            return (ledgerMap[friend.name] && ledgerMap[friend.name][friend.week_key])
                || { start: 0, raw: 0, end: 0, fine: 0, isComplete: false };
        }

        // 미래 주차 이동 시 마스터 리스트 자동 동기화 (한 주차당 1회만 수행 -> 속도 개선)
        async function syncWithMasterList(weekKey, currentData) {
            if (!supabaseClient) return currentData;

            let { data: masters, error: mErr } = await supabaseClient.from('study_mate').select('*').eq('week_key', 'master_list');
            if (mErr) { console.error("마스터 리스트 조회 실패:", mErr.message); return currentData; }
            if (!masters || masters.length === 0) return currentData;

            const targetMonday = parseWeekKeyDate(weekKey);

            const missing = masters.filter(master => {
                if (currentData.some(d => d.name === master.name)) return false;
                // 등록 시점(start_week_key) 이전 주차에는 자동으로 복사하지 않음
                const startMonday = parseWeekKeyDate(master.start_week_key);
                if (startMonday && targetMonday && targetMonday < startMonday) return false;
                return true;
            });
            if (missing.length === 0) return currentData;

            const newRows = missing.map((master, i) => {
                const fallbackTime = master.target_start_time || "08:40";
                const fallbackNotes = master.notes || Array(7).fill(fallbackTime).join("|");
                return {
                    id: Date.now() + i,
                    name: master.name,
                    target_start_time: fallbackTime,
                    week_key: weekKey,
                    time_done_list: [false, false, false, false, false, false, false],
                    start_done_list: [false, false, false, false, false, false, false],
                    bonus_done_list: [false, false, false, false, false, false, false],
                    notes: fallbackNotes,
                    day_off_used: false,
                    day_off_day: 0
                };
            });

            const { error: insErr } = await supabaseClient
                .from('study_mate')
                .upsert(newRows, { onConflict: 'name,week_key', ignoreDuplicates: true });
            if (insErr) {
                console.error("마스터 동기화 삽입 실패:", insErr.message);
                return currentData;
            }

            let { data: reFetched, error: reErr } = await supabaseClient
                .from('study_mate')
                .select('*')
                .eq('week_key', weekKey)
                .order('id', { ascending: true });
            if (reErr) { console.error(reErr.message); return currentData; }
            return reFetched || currentData;
        }

        function setSyncStatus(ok, message) {
            if (ok) {
                const el = document.getElementById('sync-status');
                el.className = "text-xs bg-emerald-100 text-emerald-800 font-bold px-3 py-1.5 rounded-full flex items-center gap-1.5 shadow-xs";
                el.innerHTML = `<span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> ${message || '실시간 서버 On'}`;
            } else {
                const el = document.getElementById('sync-status');
                el.className = "text-xs bg-amber-100 text-amber-800 font-bold px-3 py-1.5 rounded-full flex items-center gap-1.5 shadow-xs";
                el.innerHTML = `<span class="w-1.5 h-1.5 bg-amber-500 rounded-full"></span> ${message || '서버 연결 오류'}`;
            }
        }

        async function loadServerData() {
            const weekKey = getWeekStorageKey();
            document.getElementById('week-title').innerText = `${currentWeekDates[0].label.split('(')[0]} ~ ${currentWeekDates[6].label.split('(')[0]} 현황`;

            if (!supabaseClient) {
                fallbackToLocal();
                return;
            }

            try {
                let { data, error } = await supabaseClient
                    .from('study_mate')
                    .select('*')
                    .eq('week_key', weekKey)
                    .order('id', { ascending: true });

                if (error) throw error;

                if (!syncedWeeks.has(weekKey)) {
                    data = await syncWithMasterList(weekKey, data || []);
                    syncedWeeks.add(weekKey);
                }

                serverData = (data || []).filter(d => d.name !== SETTINGS_NAME);
                await loadSettings();
                await loadHistoryAndComputeLedgers();
                setSyncStatus(true);
                renderApp();
            } catch (err) {
                console.error("데이터 로드 중 에러:", err);
                try { setSyncStatus(false); } catch(e2) { console.error(e2); }
                fallbackToLocal();
            }
        }

        function fallbackToLocal() {
            const saved = localStorage.getItem(`local_backup_${getWeekStorageKey()}`);
            serverData = saved ? JSON.parse(saved) : [];
            renderApp();
        }

        function saveLocalBackup() {
            localStorage.setItem(`local_backup_${getWeekStorageKey()}`, JSON.stringify(serverData));
        }

        function toggleDaySelection(friendId, dayIdx) {
            if (!selectedDaysMap[friendId]) {
                selectedDaysMap[friendId] = [];
            }
            const pos = selectedDaysMap[friendId].indexOf(dayIdx);
            if (pos > -1) {
                selectedDaysMap[friendId].splice(pos, 1);
            } else {
                selectedDaysMap[friendId].push(dayIdx);
            }
            renderApp();
        }

        // ===== 스크롤(휠) 시간 피커 =====
        let _timePickerResolve = null;
        function openTimePicker(defaultTime, title) {
            return new Promise(resolve => {
                _timePickerResolve = resolve;
                const [dh, dm] = (defaultTime || "08:40").split(":");
                const hourSel = document.getElementById('tp-hour');
                const minSel = document.getElementById('tp-minute');
                hourSel.innerHTML = Array.from({length: 24}, (_, i) => {
                    const h = String(i).padStart(2, '0');
                    return `<option value="${h}" ${h === dh ? 'selected' : ''}>${h}시</option>`;
                }).join('');
                minSel.innerHTML = Array.from({length: 12}, (_, i) => {
                    const m = String(i * 5).padStart(2, '0');
                    return `<option value="${m}" ${m === dm ? 'selected' : ''}>${m}분</option>`;
                }).join('');
                document.getElementById('time-picker-title').innerText = title || "목표 시간 선택";
                const modal = document.getElementById('time-picker-modal');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            });
        }
        function closeTimePicker(confirmed) {
            const modal = document.getElementById('time-picker-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            if (_timePickerResolve) {
                if (confirmed) {
                    const h = document.getElementById('tp-hour').value;
                    const m = document.getElementById('tp-minute').value;
                    _timePickerResolve(`${h}:${m}`);
                } else {
                    _timePickerResolve(null);
                }
                _timePickerResolve = null;
            }
        }

        // ===== 스크롤(휠) Day Off 피커 =====
        let _dayOffResolve = null;
        function openDayOffPicker(defaultUsed, defaultDay) {
            return new Promise(resolve => {
                _dayOffResolve = resolve;
                const days = ["월요일", "화요일", "수요일", "목요일", "금요일", "토요일", "일요일"];
                const sel = document.getElementById('do-select');
                sel.innerHTML = `<option value="-1">해제 (사용 안 함)</option>` +
                    days.map((d, i) => `<option value="${i}" ${defaultUsed && defaultDay === i ? 'selected' : ''}>${d}</option>`).join('');
                const modal = document.getElementById('dayoff-picker-modal');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            });
        }
        function closeDayOffPicker(confirmed) {
            const modal = document.getElementById('dayoff-picker-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            if (_dayOffResolve) {
                _dayOffResolve(confirmed ? parseInt(document.getElementById('do-select').value, 10) : null);
                _dayOffResolve = null;
            }
        }

        async function editSelectedDaysTarget(friendId) {
            const targetDays = selectedDaysMap[friendId] || [];
            if (targetDays.length === 0) {
                alert("목표 시간을 바꿀 요일을 아래 월~일 버튼에서 먼저 선택(터치)해 주세요!");
                return;
            }

            const friend = serverData.find(f => f.id === friendId);
            if (!friend) return;

            const currentArr = parseDayTargets(friend);
            const newTime = await openTimePicker(currentArr[targetDays[0]], "선택 요일 목표 시간");
            if (!newTime) return; // 취소함

            if (!supabaseClient) {
                targetDays.forEach(idx => { currentArr[idx] = newTime; });
                friend.notes = currentArr.join("|");
                saveLocalBackup();
                selectedDaysMap[friendId] = [];
                loadServerData();
                return;
            }

            // 이 친구의 모든 주차(마스터 리스트 포함) 행을 가져온다
            const { data: allRows, error: fetchErr } = await supabaseClient
                .from('study_mate')
                .select('*')
                .eq('name', friend.name);
            if (fetchErr) { alert("조회 실패: " + fetchErr.message); return; }

            const currentMonday = parseDateKey(currentWeekDates[0].storageKey);

            // 마스터 리스트(앞으로 새로 생길 주차용) + 오늘 이후 이미 만들어진 모든 주차
            const targets = (allRows || []).filter(r => {
                if (r.week_key === 'master_list') return true;
                const rowMonday = parseWeekKeyDate(r.week_key);
                return rowMonday && rowMonday >= currentMonday;
            });

            let failCount = 0;
            for (const row of targets) {
                const arr = parseDayTargets(row);
                targetDays.forEach(idx => { arr[idx] = newTime; });
                const notesStr = arr.join("|");
                const { error: upErr } = await supabaseClient.from('study_mate').update({ notes: notesStr }).eq('id', row.id);
                if (upErr) { failCount++; console.warn(`업데이트 실패 (${row.week_key}):`, upErr.message); }
            }
            if (failCount > 0) {
                alert(`${targets.length - failCount}개 주차는 반영됐고, ${failCount}개 주차는 저장에 실패했어요.`);
            } else {
                console.log(`✅ ${targets.length}개 주차(마스터 리스트 포함)에 반영 완료`);
            }

            selectedDaysMap[friendId] = [];
            loadServerData();
        }

        function renderApp() {
            const container = document.getElementById('friends-container');
            container.innerHTML = '';

            if (!serverData || serverData.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 font-medium">오른쪽 상단의 '친구 등록하기'를 눌러 실시간 공유 멤버를 추가해 보세요!</div>`;
                return;
            }

            serverData.forEach(friend => {
                if(!friend.time_done_list) friend.time_done_list = [false, false, false, false, false, false, false];
                if(!friend.start_done_list) friend.start_done_list = [false, false, false, false, false, false, false];
                if(!friend.bonus_done_list) friend.bonus_done_list = [false, false, false, false, false, false, false];

                if(!friend.target_start_time || friend.target_start_time === "null") friend.target_start_time = "08:40";

                let dayTargets = parseDayTargets(friend);

                let timeSuccess = friend.time_done_list.filter(v => v === true).length;
                let startSuccess = friend.start_done_list.filter(v => v === true).length;
                let bonusSuccess = friend.bonus_done_list.filter(v => v === true).length;

                let timeProgress = Math.round((timeSuccess / 7) * 100);
                let targetProgress = Math.round((startSuccess / 7) * 100);

                const daysKorean = ["월요일", "화요일", "수요일", "목요일", "금요일", "토요일", "일요일"];
                let dayOffText = friend.day_off_used && friend.day_off_day !== undefined ? daysKorean[friend.day_off_day] : "미사용";

                const selectedDays = selectedDaysMap[friend.id] || [];
                const ledger = getLedgerFor(friend);
                const endLabel = ledger.isComplete ? '이번 주 마감 점수' : '현재까지 점수';
                const endColor = ledger.end < 0 ? 'text-rose-600' : (ledger.end > 0 ? 'text-emerald-600' : 'text-slate-500');

                let settleHtml;
                if (ledger.fine > 0) {
                    settleHtml = `<span class="text-rose-700">정산액 ${ledger.fine.toLocaleString()}원</span>`;
                } else {
                    settleHtml = `<span class="text-emerald-700">정산 없음 · ${ledger.end}점 다음 주로 이월</span>`;
                }

                let cardHtml = `
                    <div class="bg-white rounded-2xl border border-slate-200/80 shadow-sm overflow-hidden flex flex-col justify-between relative">
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <div class="flex items-center gap-2">
                                        <h3 class="text-lg font-bold text-slate-900">${friend.name}</h3>
                                        <button onclick="deleteFriend(${friend.id}, '${friend.name}')" class="text-xs text-slate-300 hover:text-rose-500 font-bold transition cursor-pointer p-0.5"><i class="fa-solid fa-circle-xmark"></i></button>
                                    </div>
                                    <div class="text-[11px] text-slate-500 font-medium mt-1">
                                        요일 선택 후 👉 <button onclick="editSelectedDaysTarget(${friend.id})" class="text-indigo-600 font-bold underline cursor-pointer bg-indigo-50 px-2 py-0.5 rounded-md hover:bg-indigo-100 transition">선택 요일 목표 변경</button>
                                    </div>
                                </div>
                                <button onclick="setDayOff(${friend.id})" class="text-xs font-bold px-3 py-1.5 rounded-xl border transition cursor-pointer ${friend.day_off_used ? 'bg-amber-100 border-amber-200 text-amber-800' : 'bg-white border-slate-200 text-slate-600'}">
                                    <i class="fa-solid fa-cloud text-[11px] mr-1"></i> Day Off: ${dayOffText}
                                </button>
                            </div>

                            <div class="flex gap-1 mb-4 bg-slate-50 p-1.5 rounded-xl border border-slate-100 justify-between">
                                ${["월", "화", "수", "목", "금", "토", "일"].map((day, idx) => {
                                    const isSelected = selectedDays.includes(idx);
                                    return `<button onclick="toggleDaySelection(${friend.id}, ${idx})" class="flex-1 text-xs py-1 rounded-lg font-bold transition cursor-pointer ${isSelected ? 'bg-indigo-600 text-white shadow-xs' : 'bg-white text-slate-600 border border-slate-200/60 hover:bg-slate-50'}">${day}</button>`;
                                }).join('')}
                            </div>

                            <div class="grid grid-cols-3 gap-2 mb-4 bg-slate-50 p-3 rounded-xl border border-slate-100">
                                <div><div class="text-[10px] font-bold text-slate-500 mb-1">⏰ 5h+</div><div class="text-indigo-600 font-extrabold text-sm">${timeProgress}%</div></div>
                                <div><div class="text-[10px] font-bold text-slate-500 mb-1">🎯 목표시간</div><div class="text-emerald-600 font-extrabold text-sm">${targetProgress}%</div></div>
                                <div><div class="text-[10px] font-bold text-slate-500 mb-1">📈 보너스</div><div class="text-amber-600 font-extrabold text-sm">${bonusSuccess}/7일</div></div>
                            </div>

                            <div class="space-y-3">
                                <div class="grid grid-cols-8 text-center text-[10px] font-bold text-slate-400 pb-1 border-b border-slate-100">
                                    <div>구분</div>${currentWeekDates.map(d => `<div>${d.label}</div>`).join('')}
                                </div>

                                <div class="grid grid-cols-8 text-center text-[9px] font-bold text-indigo-600 bg-indigo-50/70 py-0.5 rounded-md">
                                    <div class="text-slate-400">목표시간</div>
                                    ${dayTargets.map(t => `<div>${t}</div>`).join('')}
                                </div>

                                <div class="grid grid-cols-8 items-center text-center">
                                    <div class="text-[11px] font-bold text-slate-500 text-left">공부 5h+</div>
                                    ${friend.time_done_list.map((v, idx) => `
                                        <div class="flex justify-center">
                                            <button onclick="toggleCheck(${friend.id}, ${idx}, 'time_done_list', ${v})" class="w-6 h-6 rounded-md flex items-center justify-center border text-xs cursor-pointer ${friend.day_off_used && friend.day_off_day === idx ? 'bg-amber-100 border-amber-100 text-amber-600' : v ? 'bg-indigo-50 border-indigo-200 text-indigo-600 font-bold' : 'bg-white border-slate-200'}">
                                                ${friend.day_off_used && friend.day_off_day === idx ? '☁️' : v ? 'O' : 'X'}
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="grid grid-cols-8 items-center text-center">
                                    <div class="text-[11px] font-bold text-slate-500 text-left">목표시간</div>
                                    ${friend.start_done_list.map((v, idx) => `
                                        <div class="flex justify-center">
                                            <button onclick="toggleCheck(${friend.id}, ${idx}, 'start_done_list', ${v})" class="w-6 h-6 rounded-md flex items-center justify-center border text-xs cursor-pointer ${friend.day_off_used && friend.day_off_day === idx ? 'bg-amber-100 border-amber-100 text-amber-600' : v ? 'bg-emerald-50 border-emerald-200 text-emerald-600 font-bold' : 'bg-white border-slate-200'}">
                                                ${friend.day_off_used && friend.day_off_day === idx ? '☁️' : v ? 'O' : 'X'}
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="grid grid-cols-8 items-center text-center">
                                    <div class="text-[11px] font-bold text-slate-500 text-left">보너스(${appSettings.bonusHours}h+)</div>
                                    ${friend.bonus_done_list.map((v, idx) => `
                                        <div class="flex justify-center">
                                            <button onclick="toggleCheck(${friend.id}, ${idx}, 'bonus_done_list', ${v})" class="w-6 h-6 rounded-md flex items-center justify-center border text-xs cursor-pointer ${friend.day_off_used && friend.day_off_day === idx ? 'bg-amber-100 border-amber-100 text-amber-600' : v ? 'bg-amber-50 border-amber-200 text-amber-600 font-bold' : 'bg-white border-slate-200'}">
                                                ${friend.day_off_used && friend.day_off_day === idx ? '☁️' : v ? '★' : '·'}
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                        <div class="bg-slate-50 px-6 py-3.5 border-t border-slate-100">
                            <div class="flex justify-between items-center text-[11px] text-slate-500 font-semibold mb-1">
                                <span>이번 주 시작 잔고 ${ledger.start}점</span>
                                <span>변동 ${ledger.raw >= 0 ? '+' : ''}${ledger.raw}점</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-bold text-slate-600">${endLabel}</span>
                                <span class="text-sm font-extrabold ${endColor}">${ledger.end}점</span>
                            </div>
                            <div class="text-[11px] font-bold text-right mt-1">${settleHtml}</div>
                        </div>
                    </div>`;
                container.innerHTML += cardHtml;
            });
        }

        async function addNewFriend() {
            const name = prompt("새로운 친구 이름을 입력하세요:");
            if(!name || name.trim() === "") return;
            if(name.trim() === SETTINGS_NAME) { alert("사용할 수 없는 이름이에요."); return; }

            const picked = await openTimePicker("08:40", "목표 시작 시간 설정");
            const time = picked || "08:40";
            const defaultNotes = Array(7).fill(time).join("|");
            const startWeekKey = getWeekStorageKey();
            const blank7 = [false, false, false, false, false, false, false];

            if (supabaseClient) {
                // 1. 미래 자동 복사용 마스터 명단에 추가 (등록 주차를 함께 기록)
                const { error: e1 } = await supabaseClient.from('study_mate').upsert([{
                    id: Date.now(),
                    name: name.trim(),
                    target_start_time: time,
                    week_key: 'master_list',
                    start_week_key: startWeekKey,
                    time_done_list: blank7,
                    start_done_list: blank7,
                    bonus_done_list: blank7,
                    notes: defaultNotes,
                    day_off_used: false, day_off_day: 0
                }], { onConflict: 'name,week_key', ignoreDuplicates: true });
                if (e1) { alert("등록 실패 (마스터 리스트): " + e1.message); return; }

                // 2. 현재 주차에도 실시간 동시 추가 (자가 치유 로직을 위해 등록 시점도 함께 기록)
                const { error: e2 } = await supabaseClient.from('study_mate').upsert([{
                    id: Date.now() + 1,
                    name: name.trim(),
                    target_start_time: time,
                    week_key: getWeekStorageKey(),
                    start_week_key: startWeekKey,
                    time_done_list: blank7,
                    start_done_list: blank7,
                    bonus_done_list: blank7,
                    notes: defaultNotes,
                    day_off_used: false, day_off_day: 0
                }], { onConflict: 'name,week_key', ignoreDuplicates: true });
                if (e2) { alert("등록 실패 (이번 주): " + e2.message); return; }
            } else {
                serverData.push({
                    id: Date.now(), name: name.trim(), target_start_time: time, week_key: getWeekStorageKey(),
                    time_done_list: blank7, start_done_list: blank7, bonus_done_list: blank7,
                    notes: defaultNotes,
                    day_off_used: false, day_off_day: 0
                });
                saveLocalBackup();
            }
            loadServerData();
        }

        async function toggleCheck(id, index, listName, currentVal) {
            const friend = serverData.find(f => f.id === id);
            if(friend) {
                if(friend.day_off_used && friend.day_off_day === index) return;
                let newList = [...(friend[listName] || [false,false,false,false,false,false,false])];
                newList[index] = !currentVal;

                if (supabaseClient) {
                    const { error } = await supabaseClient.from('study_mate').update({ [listName]: newList }).eq('id', id);
                    if (error) { alert("저장 실패: " + error.message); return; }
                } else {
                    friend[listName] = newList;
                    saveLocalBackup();
                }
                loadServerData();
            }
        }

        async function setDayOff(id) {
            const friend = serverData.find(f => f.id === id);
            if(!friend) return;

            const result = await openDayOffPicker(friend.day_off_used, friend.day_off_day);
            if (result === null) return; // 취소함

            const used = result !== -1;
            const dayIndex = used ? result : 0;

            if (supabaseClient) {
                const { error } = await supabaseClient.from('study_mate').update({ day_off_used: used, day_off_day: dayIndex }).eq('id', id);
                if (error) { alert("저장 실패: " + error.message); return; }
            } else {
                friend.day_off_used = used; friend.day_off_day = dayIndex; saveLocalBackup();
            }
            loadServerData();
        }

        async function deleteFriend(id, name) {
            if(confirm(`정말로 '${name}' 님을 명단에서 삭제하시겠습니까?\n(이전/이후 모든 주차 기록이 함께 삭제됩니다.)`)) {
                if (supabaseClient) {
                    // 이름 기준으로 모든 주차(마스터 포함) 기록을 한 번에 삭제
                    const { error } = await supabaseClient.from('study_mate').delete().eq('name', name);
                    if (error) { alert("삭제 실패: " + error.message); return; }
                } else {
                    serverData = serverData.filter(f => f.id !== id);
                    saveLocalBackup();
                }
                loadServerData();
            }
        }

        // 외부 CDN(Supabase 라이브러리)이 느리거나 차단된 네트워크에서도
        // 화면(D-day, 주차 표시)이 절대 멈춰있지 않도록, DOMContentLoaded에 의존하지 않고
        // 이 스크립트가 실행되는 즉시(DOM은 이미 파싱된 상태) 부팅한다.
        function waitForSupabaseLib(timeoutMs = 4000, intervalMs = 150) {
            return new Promise(resolve => {
                const start = Date.now();
                (function check() {
                    if (window.supabase && typeof window.supabase.createClient === 'function') {
                        resolve(true);
                    } else if (Date.now() - start > timeoutMs) {
                        resolve(false);
                    } else {
                        setTimeout(check, intervalMs);
                    }
                })();
            });
        }

        function injectScript(src) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = src;
                s.onload = () => resolve(true);
                s.onerror = () => reject(new Error('로드 실패: ' + src));
                document.head.appendChild(s);
            });
        }

        // jsdelivr(기본) → 실패 시 unpkg(백업) 순서로 재시도. 특정 CDN 하나가
        // 그 순간 느리거나 막혀도 다른 경로로 라이브러리를 확보한다.
        async function ensureSupabaseLib() {
            let ready = await waitForSupabaseLib(4000);
            if (ready) return true;

            console.warn("jsdelivr에서 Supabase 로드 지연/실패 - unpkg으로 재시도합니다.");
            try {
                await injectScript('https://unpkg.com/@supabase/supabase-js@2');
                ready = await waitForSupabaseLib(4000);
                if (ready) return true;
            } catch (e) {
                console.warn(e.message);
            }
            return false;
        }

        async function bootApp() {
            // 1) 네트워크/CDN과 무관하게 즉시 표시되어야 하는 것들
            updateDDays();
            currentWeekDates = getWeekDates(weekOffset);
            document.getElementById('week-title').innerText =
                `${currentWeekDates[0].label.split('(')[0]} ~ ${currentWeekDates[6].label.split('(')[0]} 현황`;

            // 2) Supabase 라이브러리 확보 시도 (jsdelivr → unpkg 순서, 최대 8초)
            const ready = await ensureSupabaseLib();
            if (ready) {
                initSupabase();
            } else {
                console.warn("Supabase 라이브러리를 불러오지 못했습니다. 로컬 모드로 전환합니다.");
                setSyncStatus(false, "로컬 모드 (서버 연결 안됨)");
            }

            loadServerData();
            setInterval(loadServerData, 5000);
        }

        bootApp();
    </script>
