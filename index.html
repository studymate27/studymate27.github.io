<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY MATE</title>
    <meta property="og:title" content="STUDY MATE">
    <meta name="twitter:title" content="STUDY MATE">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./src/presentation/theme.css">
</head>
<body class="study-shell">

    <header class="study-header">
        <div class="study-header-inner">
            <div class="study-brand">
                <div class="study-logo">
                    <i class="fa-solid fa-graduation-cap text-xl"></i>
                </div>
                <div>
                    <h1 class="study-title">Study Mate</h1>
                    <p class="study-subtitle"></p>
                </div>
            </div>

            <div class="study-metrics">
                <div class="study-chip">
                    9모: <span id="mopyung-dday" class="text-amber-600 font-extrabold text-sm">D-Day</span>
                </div>
                <div class="study-chip">
                    수능: <span id="suneung-dday" class="text-rose-600 font-extrabold text-sm">D-Day</span>
                </div>
            </div>

            <button onclick="addNewFriend()" class="study-primary-button cursor-pointer hidden">
                <i class="fa-solid fa-user-plus mr-1"></i> 친구 등록하기
            </button>
        </div>
        <div class="study-rulebar">
            <p class="text-[11px] text-slate-400 font-medium text-center md:text-left">
                <button onclick="editMinimumHours()" class="rulebar-setting-button cursor-pointer">공부 시간: <span id="minimum-hours-label">-</span> <i class="fa-solid fa-pen"></i></button>
                <button onclick="editBonusHours()" class="rulebar-setting-button cursor-pointer">상점 기준: <span id="bonus-hours-label">-</span> <i class="fa-solid fa-pen"></i></button>
                <button onclick="editFineUnit()" class="rulebar-setting-button cursor-pointer">벌금 단위: <span id="fine-unit-label">-</span> <i class="fa-solid fa-pen"></i></button>
            </p>
        </div>
    </header>

    <main class="study-main">
        <div class="study-toolbar flex justify-between items-center mb-8">
            <div class="study-week-control flex items-center gap-2">
                <button onclick="changeWeek(-1)" class="study-week-button cursor-pointer" aria-label="이전 주">‹</button>
                <h2 id="week-title" class="text-sm md:text-base font-bold text-slate-800 px-2 min-w-[180px] text-center">주차 계산 중...</h2>
                <button onclick="changeWeek(1)" class="study-week-button cursor-pointer" aria-label="다음 주">›</button>
            </div>
            <span id="sync-status" class="hidden"></span>
        </div>

        <div id="friends-container" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
    </main>

    <!-- 시간 선택 모달 (스크롤 피커) -->
    <div id="time-picker-modal" class="study-modal fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] hidden items-center justify-center px-4">
        <div class="study-modal-panel bg-white rounded-2xl shadow-xl w-full max-w-xs p-5">
            <h3 id="time-picker-title" class="text-sm font-bold text-slate-800 mb-4 text-center">시작 시간 선택</h3>
            <div class="flex justify-center items-center gap-2 mb-5">
                <select id="tp-hour" class="text-2xl font-bold text-center bg-slate-50 border border-slate-200 rounded-xl py-3 px-2 w-24 focus:outline-none focus:ring-2 focus:ring-indigo-300"></select>
                <span class="text-2xl font-bold text-slate-400">:</span>
                <select id="tp-minute" class="text-2xl font-bold text-center bg-slate-50 border border-slate-200 rounded-xl py-3 px-2 w-24 focus:outline-none focus:ring-2 focus:ring-indigo-300"></select>
            </div>
            <div class="flex gap-2">
                <button onclick="closeTimePicker(false)" class="study-modal-button flex-1 py-2.5 rounded-xl bg-slate-100 text-slate-600 font-bold text-sm cursor-pointer">취소</button>
                <button onclick="closeTimePicker(true)" class="study-modal-button is-primary flex-1 py-2.5 rounded-xl bg-indigo-600 text-white font-bold text-sm cursor-pointer">확인</button>
            </div>
        </div>
    </div>

    <!-- Day Off 선택 모달 (스크롤 피커) -->
    <div id="dayoff-picker-modal" class="study-modal fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] hidden items-center justify-center px-4">
        <div class="study-modal-panel bg-white rounded-2xl shadow-xl w-full max-w-xs p-5">
            <h3 class="text-sm font-bold text-slate-800 mb-4 text-center">Day Off 요일 선택</h3>
            <div id="dayoff-week-fields" class="dayoff-week-fields"></div>
            <div class="flex gap-2">
                <button onclick="closeDayOffPicker(false)" class="study-modal-button flex-1 py-2.5 rounded-xl bg-slate-100 text-slate-600 font-bold text-sm cursor-pointer">취소</button>
                <button onclick="closeDayOffPicker(true)" class="study-modal-button is-primary flex-1 py-2.5 rounded-xl bg-amber-500 text-white font-bold text-sm cursor-pointer">확인</button>
            </div>
        </div>
    </div>

    <!-- 요일별 시작 시간 수정 모달 -->
    <div id="target-week-modal" class="study-modal hidden">
        <div class="study-modal-panel">
            <h3 class="target-week-title">요일별 시작 시간</h3>
            <div id="target-week-fields" class="target-week-fields"></div>
            <div class="modal-actions">
                <button onclick="closeTargetWeekPicker(false)" class="study-modal-button">취소</button>
                <button onclick="closeTargetWeekPicker(true)" class="study-modal-button is-primary">확인</button>
            </div>
        </div>
    </div>

    <!-- 상점 기준 시간 선택 모달 -->
    <div id="bonus-picker-modal" class="study-modal hidden">
        <div class="study-modal-panel">
            <h3 id="bonus-picker-title" class="target-week-title">상점 기준 시간</h3>
            <div class="setting-picker-row">
                <input id="bonus-hour-input" type="text" inputmode="decimal" autocomplete="off" class="setting-number-input" />
                <span>시간 이상</span>
            </div>
            <div class="modal-actions">
                <button onclick="closeBonusPicker(false)" class="study-modal-button">취소</button>
                <button onclick="closeBonusPicker(true)" class="study-modal-button is-primary">확인</button>
            </div>
        </div>
    </div>

    <!-- 벌금 단위 선택 모달 -->
    <div id="fine-unit-picker-modal" class="study-modal hidden">
        <div class="study-modal-panel">
            <h3 class="target-week-title">벌금 단위</h3>
            <div class="setting-picker-row">
                <input id="fine-unit-input" type="text" inputmode="numeric" autocomplete="off" class="setting-number-input is-wide" />
                <span>원 / 점</span>
            </div>
            <div class="modal-actions">
                <button onclick="closeFineUnitPicker(false)" class="study-modal-button">취소</button>
                <button onclick="closeFineUnitPicker(true)" class="study-modal-button is-primary">확인</button>
            </div>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
